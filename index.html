<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Mobile Workout App</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://jsdelivr.net"></script>
    <!-- React and Babel CDNs -->
    <script src="https://unpkg.com" crossorigin></script>
    <script src="https://unpkg.com" crossorigin></script>
    <script src="https://unpkg.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        /* ----------------------------- Doodle icons ----------------------------- */
        const Dumbbell = ({ className = "" }) => (
          <svg viewBox="0 0 64 64" className={className} fill="none">
            <rect x="6" y="24" width="10" height="16" rx="3" stroke="currentColor" strokeWidth="3" />
            <rect x="48" y="24" width="10" height="16" rx="3" stroke="currentColor" strokeWidth="3" />
            <path d="M16 31 H48" stroke="currentColor" strokeWidth="4" strokeLinecap="round" />
            <path d="M22 22 V42 M42 22 V42" stroke="currentColor" strokeWidth="3" strokeLinecap="round" />
          </svg>
        );

        const Band = ({ className = "" }) => (
          <svg viewBox="0 0 64 64" className={className} fill="none">
            <path
              d="M14 12c-10 8-10 32 0 40 6 5 14 5 18-2 3-6-1-12-7-12s-9 6-6 11c4 7 12 7 18 2 10-8 10-32 0-40"
              stroke="currentColor"
              strokeWidth="3.5"
              strokeLinecap="round"
              fill="none"
            />
          </svg>
        );

        const Yoga = ({ className = "" }) => (
          <svg viewBox="0 0 64 64" className={className} fill="none">
            <circle cx="32" cy="12" r="5" stroke="currentColor" strokeWidth="3" />
            <path
              d="M32 17 V34 M32 34 C20 38 14 48 12 54 M32 34 C44 38 50 48 52 54 M22 26 C26 30 38 30 42 26"
              stroke="currentColor"
              strokeWidth="3"
              strokeLinecap="round"
              fill="none"
            />
          </svg>
        );

        const Walk = ({ className = "" }) => (
          <svg viewBox="0 0 64 64" className={className} fill="none">
            <path
              d="M18 50c2-3 1-7-2-9s-3-7 1-9 8 1 8 6c0 3-2 4-2 7 0 4 4 5 6 2"
              stroke="currentColor"
              strokeWidth="3"
              strokeLinecap="round"
              fill="none"
            />
            <path
              d="M38 30c2-3 1-7-2-9s-3-7 1-9 8 1 8 6c0 3-2 4-2 7 0 4 4 5 6 2"
              stroke="currentColor"
              strokeWidth="3"
              strokeLinecap="round"
              fill="none"
            />
          </svg>
        );

        const Sun = ({ className = "" }) => (
          <svg viewBox="0 0 64 64" className={className} fill="none">
            <circle cx="32" cy="32" r="10" stroke="currentColor" strokeWidth="3" />
            {[0, 45, 90, 135, 180, 225, 270, 315].map((deg) => (
              <line
                key={deg}
                x1={32 + 16 * Math.cos((deg * Math.PI) / 180)}
                y1={32 + 16 * Math.sin((deg * Math.PI) / 180)}
                x2={32 + 22 * Math.cos((deg * Math.PI) / 180)}
                y2={32 + 22 * Math.sin((deg * Math.PI) / 180)}
                stroke="currentColor"
                strokeWidth="3"
                strokeLinecap="round"
              />
            ))}
          </svg>
        );

        /* ------------------------- Exercise pictograms ------------------------- */
        const fig = { stroke: "#3a3a3a" };

        function Head({ cx, cy }) {
          return <circle cx={cx} cy={cy} r="6" stroke={fig.stroke} strokeWidth="3" fill="white" />;
        }
        function Limb({ d }) {
          return <path d={d} stroke={fig.stroke} strokeWidth="3" strokeLinecap="round" fill="none" />;
        }
        function Arrow({ d, color }) {
          return <path d={d} stroke={color} strokeWidth="3" strokeLinecap="round" strokeDasharray="2 4" fill="none" markerEnd="url(#arrowhead)" />;
        }
        function Weight({ x, y, color }) {
          return <rect x={x - 5} y={y - 4} width="10" height="8" rx="2" fill={color} />;
        }
        function BandMark({ x1, y1, x2, y2, color }) {
          return <path d={`M${x1} ${y1} Q${(x1+x2)/2} ${(y1+y2)/2 - 8} ${x2} ${y2}`} stroke={color} strokeWidth="2.5" fill="none" />;
        }

        const Diagram = ({ move, color }) => {
          const arrowDefs = (
            <defs>
              <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
                <path d="M0,0 L6,3 L0,6 Z" fill={color} />
              </marker>
            </defs>
          );

          const wrap = (children) => (
            <svg viewBox="0 0 100 100" className="w-full h-full">
              {arrowDefs}
              {children}
            </svg>
          );

          switch (move) {
            case "overheadPress":
              return wrap(<>
                <Head cx={50} cy={28} />
                <Limb d="M50 34 V62" />
                <Limb d="M50 38 L36 18 M50 38 L64 18" />
                <Limb d="M50 62 L40 88 M50 62 L60 88" />
                <Weight x={36} y={18} color={color} /><Weight x={64} y={18} color={color} />
                <Arrow d="M50 18 V6" color={color} />
              </>);
            case "floorPress":
              return wrap(<>
                <Head cx={20} cy={55} />
                <Limb d="M26 55 H78" />
                <Limb d="M40 55 L40 35" />
                <Limb d="M55 55 L55 35" />
                <Weight x={40} y={32} color={color} /><Weight x={55} y={32} color={color} />
                <Limb d="M78 55 L88 60 M78 55 L88 50" />
                <Arrow d="M47 30 V18" color={color} />
              </>);
            case "facePull":
              return wrap(<>
                <Head cx={50} cy={30} />
                <Limb d="M50 36 L35 48 M50 36 L65 48" />
                <Arrow d="M35 48 L50 36" color={color} />
              </>);
            default:
              return null;
          }
        };

        // Main App Component Dashboard View
        function App() {
            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col items-center justify-center p-4 text-center">
                    <div className="bg-white p-6 rounded-2xl shadow-xl w-full">
                        <Dumbbell className="w-20 h-20 mx-auto text-blue-500 mb-4" />
                        <h1 className="text-2xl font-bold tracking-tight mb-2 text-gray-800">Workout App Loaded</h1>
                        <p className="text-sm text-gray-500 mb-6">Your customized interface diagrams are compilation-ready.</p>
                        
                        <div className="grid grid-cols-2 gap-4 mb-6">
                            <div className="p-3 border border-gray-100 rounded-xl bg-gray-50 flex flex-col items-center">
                                <span className="text-xs font-semibold mb-1 text-gray-600">Overhead Press</span>
                                <div className="w-24 h-24"><Diagram move="overheadPress" color="#3b82f6" /></div>
                            </div>
                            <div className="p-3 border border-gray-100 rounded-xl bg-gray-50 flex flex-col items-center">
                                <span className="text-xs font-semibold mb-1 text-gray-600">Floor Press</span>
                                <div className="w-24 h-24"><Diagram move="floorPress" color="#10b981" /></div>
                            </div>
                        </div>

                        <span className="text-xs px-3 py-1 bg-green-50 text-green-600 rounded-full font-medium tracking-wide">
                            ✓ App Live & Installable
                        </span>
                    </div>
                </div>
            );
        }

        // Render target
        const container = document.getElementById('root');
        if (container) {
            const root = ReactDOM.createRoot(container);
            root.render(<App />);
        }
    </script>
</body>
</html>
